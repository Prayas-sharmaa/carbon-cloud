name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  Dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install awsebcli  

  SonarCloud Scan:
    runs-on: ubuntu-latest
    needs: Dependencies
    steps:
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  AWS Setup:
    runs-on: ubuntu-latest
    needs: SonarCloud Scan
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} 
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

  Beanstalk Deployment:
    runs-on: ubuntu-latest
    needs: AWS Setup
    steps:
      - name: Deploy to Elastic Beanstalk
        run: |
          eb init ${{ secrets.EB_APP_NAME }} --platform python-3.11 --region ${{ secrets.AWS_DEFAULT_REGION }}
          eb use ${{ secrets.EB_ENV_NAME }}
          eb deploy --staged

  zap_scan:
      runs-on: ubuntu-latest
      needs: Beanstalk Deployment
      name: OWASP ZAP Baseline Scan
   
      permissions:
        contents: read
        security-events: write
   
      steps:
        - name: Create writable output directory
          run: mkdir -p ${{ github.workspace }}/zap-output
          
        - uses: actions/checkout@v4
   
        - uses: zaproxy/action-baseline@v0.15.0
          with:
            target: ${{ secrets.APP_URL }}
            fail_action: false
            allow_issue_writing: false
          env:
            GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
   
        - name: Upload ZAP Report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: zap-security-report
            path: zap-output/zapreport.html
