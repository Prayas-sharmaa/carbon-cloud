{% extends "carbon/base.html" %}
{% block title %}Log Entry - CarbonCloud{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px;">
    <h2>🌱 Log Carbon Entry</h2>
    <p style="color: #718096; margin-bottom: 1.5rem;">Track your carbon footprint and earn loyalty points!</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
        {% endfor %}
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-green">Save Entry</button>
            <a href="{% url 'entry-list' %}" class="btn btn-gray">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
