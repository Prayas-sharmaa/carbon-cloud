{% extends "carbon/base.html" %}
{% block title %}Login - CarbonCloud{% endblock %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 2rem auto;">
    <h2> Welcome Back</h2>
    <p style="color: #718096; margin-bottom: 1.5rem;">Login to your CarbonCloud account.</p>
    <form method="post">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username" class="form-input" required autofocus>
        <label>Password</label>
        <input type="password" name="password" class="form-input" required>
        <button type="submit" class="btn btn-green" style="width: 100%; margin-top: 0.5rem;">Login</button>
    </form>
    <p class="mt-2" style="text-align: center;">No account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
